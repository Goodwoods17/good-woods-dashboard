name: CI

# Runs the full verification gate on every PR to main and every push to main,
# so broken type-checks, lint errors, failing unit tests, or build breaks are
# caught automatically instead of relying on a human running them locally.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel an in-progress run when new commits are pushed to the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Unit tests (Vitest)
        run: npm test

      - name: Build
        run: npm run build
        env:
          # Placeholder public env so the client bundle builds without secrets.
          # The app guards live calls behind hasSupabase(); real values live in
          # Vercel. These are non-secret, build-time-only stand-ins.
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key

  # Authed browser smoke against a seeded LOCAL Supabase (Auth + RLS + Postgres),
  # booted via the Supabase CLI on the runner. Catches the interactive class of
  # bugs that tsc/lint/jsdom can't see, off prod data. See ADR 0018.
  e2e:
    runs-on: ubuntu-latest
    env:
      E2E_EMAIL: e2e@goodwoods.local
      E2E_PASSWORD: e2e-smoke-password
      # Invoices (milestone #4) is feature-flagged OFF in prod; turn it ON for
      # the e2e job so the capture-tracer smoke can reach /invoices. Inlined at
      # build time (NEXT_PUBLIC_*), so it must be set before the build step.
      NEXT_PUBLIC_INVOICES_ENABLED: "true"
      # QBO sync (issue #147+) rides a separate dark-ship sub-flag, OFF in prod.
      # Turn it ON for the e2e job so the Connect QuickBooks settings panel
      # renders under test. With no QBO OAuth creds present it degrades to a clean
      # "not configured" state with no live Intuit call.
      NEXT_PUBLIC_INVOICES_QBO_ENABLED: "true"
      # Job Status (milestone #5) is likewise flag-gated OFF in prod; turn it ON
      # for the e2e job so the live-status-cycle smoke can reach /status.
      NEXT_PUBLIC_JOB_STATUS_ENABLED: "true"
      # Scheduling (milestone #7) is likewise flag-gated OFF in prod; turn it ON
      # for the e2e job so the read-only schedule-timeline smoke renders.
      NEXT_PUBLIC_SCHEDULING_ENABLED: "true"
      # P6 dark-ship sub-flag (S23+): the not-yet-live scheduling surfaces (Google
      # Calendar push, P&L forecast) ride a separate switch, OFF in prod. Turn it
      # ON for the e2e job so the gated panels render under test. The Google push
      # degrades to a clean "not configured" state with no OAuth creds present.
      NEXT_PUBLIC_SCHEDULING_P6_ENABLED: "true"
      # Project Files & Sharing (milestone #12) is flag-gated OFF in prod; turn it
      # ON for the e2e job so the document share-link mint UI + the no-login
      # /d/<token> view portal render under test.
      NEXT_PUBLIC_PROJECT_FILES_ENABLED: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          # Pinned (not `latest`) — `latest` resolves via the unauthenticated
          # GitHub releases API every run and gets rate-limited, intermittently
          # failing the e2e job at install time. A fixed version skips that lookup.
          version: 2.108.0

      - name: Start local Supabase (replays all migrations from zero)
        run: supabase start

      - name: Export local Supabase env
        run: |
          eval "$(supabase status -o env)"
          {
            echo "NEXT_PUBLIC_SUPABASE_URL=$API_URL"
            echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$ANON_KEY"
            echo "SUPABASE_URL=$API_URL"
            echo "SUPABASE_SERVICE_ROLE_KEY=$SERVICE_ROLE_KEY"
          } >> "$GITHUB_ENV"

      - name: Seed the E2E smoke user
        run: node scripts/seed-e2e.mjs

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Build (against local Supabase)
        run: npm run build

      - name: Run E2E smoke (Playwright starts the built app)
        run: npx playwright test

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
